name: Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[all]

    - name: Decode test data dependencies
      run: |
        echo "${{ secrets.TEST_ENERGY_DATA }}" | base64 --decode > tests/energy_grids.npz
        echo "${{ secrets.TEST_G087_DATA }}" | base64 --decode > tests/G087_grid_index.npz
        echo "${{ secrets.TEST_G361_DATA }}" | base64 --decode > tests/G361_grid_index.npz
        echo "${{ secrets.TEST_G618_DATA }}" | base64 --decode > tests/G618_grid_index.npz

    - name: Run tests with coverage and JUnit output
      run: |
        pytest --ml --cov=discrete1 --cov-report=xml --junitxml=pytest-report.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: true
        verbose: true

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        report_type: test_results
        files: ./pytest-report.xml
        fail_ci_if_error: true
        verbose: true
